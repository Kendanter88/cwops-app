{% extends "base.html" %}
{% block title %}Sign in · CW Academy{% endblock %}
{% block content %}
<h1>Sign in</h1>
<form class="panel" method="post" action="{{ url_for('auth.login') }}" style="max-width:420px">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <input type="hidden" name="next" value="{{ next }}">
  <label for="email">Email</label>
  <input id="email" name="email" type="email" autocomplete="username" required autofocus>
  <label for="password">Password</label>
  <input id="password" name="password" type="password" autocomplete="current-password" required>
  <button class="btn" type="submit">Sign in</button>
</form>
<p class="muted">Advisors: use the activation link from your invite email to set a password first.</p>
{% endblock %}
