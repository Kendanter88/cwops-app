<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}CW Academy{% endblock %}</title>
<style>
  :root { --bg:#0f1216; --panel:#181c22; --line:#2a313b; --fg:#e7ebf0; --mut:#9aa4b2; --accent:#d99a3a; --red:#c2433a; --grn:#3a9d54; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif; }
  header { display:flex; align-items:center; justify-content:space-between; padding:.7rem 1.1rem; border-bottom:1px solid var(--line); background:var(--panel); }
  header .brand { font-weight:700; color:var(--fg); text-decoration:none; letter-spacing:.02em; }
  header nav a { color:var(--mut); text-decoration:none; margin-left:1rem; }
  header nav a:hover { color:var(--fg); }
  main { max-width:880px; margin:1.5rem auto; padding:0 1.1rem; }
  h1 { font-size:1.45rem; margin:.2rem 0 1rem; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:1.1rem 1.2rem; margin-bottom:1.1rem; }
  label { display:block; font-size:.85rem; color:var(--mut); margin:.6rem 0 .25rem; }
  input[type=text], input[type=email], input[type=password], select {
    width:100%; padding:.5rem .6rem; background:#11151a; color:var(--fg);
    border:1px solid var(--line); border-radius:7px; font-size:1rem; }
  .row { display:flex; gap:1rem; flex-wrap:wrap; }
  .row > div { flex:1 1 200px; }
  .btn { display:inline-block; margin-top:.9rem; padding:.5rem 1rem; border:0; border-radius:7px;
    background:var(--accent); color:#10131a; font-weight:700; cursor:pointer; text-decoration:none; }
  .btn.ghost { background:transparent; color:var(--fg); border:1px solid var(--line); }
  .flash { padding:.6rem .8rem; border-radius:7px; margin-bottom:.7rem; border:1px solid var(--line); }
  .flash.error { border-color:var(--red); color:#f3b6b1; }
  .flash.ok { border-color:var(--grn); color:#aee0bb; }
  .flash.warn { border-color:var(--accent); color:#f0d3a2; }
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:left; padding:.45rem .5rem; border-bottom:1px solid var(--line); font-size:.92rem; }
  th { color:var(--mut); font-weight:600; }
  .tag { font-size:.72rem; padding:.1rem .45rem; border-radius:99px; border:1px solid var(--line); color:var(--mut); }
  .tag.ok { color:#aee0bb; border-color:var(--grn); }
  .muted { color:var(--mut); font-size:.85rem; }
</style>
</head>
<body>
<header>
  <a class="brand" href="/">CW Academy</a>
  <nav>
    {% if cu %}
      {% if cu.is_admin %}<a href="{{ url_for('admin.users') }}">Advisors</a>{% endif %}
      <a href="{{ url_for('certs.index') }}">Certificates</a>
      <span class="muted">{{ cu.email }}</span>
      <a href="{{ url_for('auth.logout') }}">Sign out</a>
    {% else %}
      <a href="{{ url_for('auth.login') }}">Sign in</a>
    {% endif %}
  </nav>
</header>
<main>
  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}<div class="flash {{ cat }}">{{ msg }}</div>{% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
